name: Build and publish to docs/

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-build
  cancel-in-progress: true

jobs:
  build:
    # Skip the run that this workflow itself creates (loop guard).
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
        env:
          VITE_BASE_PATH: /v0-maple-key-website/

      - name: Refresh docs/ from dist/
        run: |
          rm -rf docs
          mv dist docs
          touch docs/.nojekyll

      - name: Commit and push docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No changes to docs/."
            exit 0
          fi
          git commit -m "build: refresh docs/ [skip ci]"
          git push
